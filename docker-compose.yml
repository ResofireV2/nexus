services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_dev"]
      interval: 30s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: "ecto://nexus:nexus@db/nexus_dev"
      SECRET_KEY_BASE: "dev_secret_key_base_replace_in_production_min_64_chars_long_xxxx"
      PHX_HOST: "localhost"
      PORT: "4000"
      MIX_ENV: "dev"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "mix deps.get &&
             npm install --prefix assets &&
             mix ecto.create &&
             mix ecto.migrate &&
             mix run priv/repo/seeds.exs &&
             mix phx.server"

volumes:
  postgres_data:
  mix_deps:
  mix_build:
