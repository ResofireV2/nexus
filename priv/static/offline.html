<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>You're offline · Nexus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #030712;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #0d0d14;
      border: 0.5px solid #1e293b;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
      font-size: 26px;
      font-weight: 600;
      color: #a78bfa;
      font-family: Inter, sans-serif;
      flex-shrink: 0;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(91, 78, 245, 0.12);
      border: 0.5px solid rgba(91, 78, 245, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .icon-wrap svg {
      width: 28px;
      height: 28px;
      stroke: #7B6EFF;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0 0 10px;
      letter-spacing: -0.3px;
    }

    p {
      font-size: 15px;
      color: #64748b;
      margin: 0 0 32px;
      max-width: 300px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #5B4EF5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.1px;
      text-decoration: none;
    }

    .btn:hover { background: #4c41d4; }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pill {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(248, 113, 113, 0.1);
      border: 0.5px solid rgba(248, 113, 113, 0.25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #f87171;
      font-weight: 500;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f87171;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">N</div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#7B6EFF" stroke="none"/>
      </svg>
    </div>

    <h1>You're offline</h1>
    <p>No internet connection right now. Check your connection and try again.</p>

    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74"/>
        <path d="M3 3v5h5"/>
      </svg>
      Try again
    </button>

    <div class="pill">
      <div class="pill-dot"></div>
      Offline
    </div>
  </div>
</body>
</html>
